name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update version in template.php
        run: |
          VERSION=${GITHUB_REF_NAME}
          sed -i "s/version: dev/version: ${VERSION}/" template.php

      - name: Prepare package structure
        run: |
          VERSION=${GITHUB_REF_NAME}

          mkdir -p build/upload/custom/templates/AuroraV2

          # Copy everything except README.md and .git
          rsync -av \
            --exclude='README.md' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='build' \
            ./ build/upload/custom/templates/AuroraV2/

          cd build
          zip -r ../Aurora.${VERSION}.zip upload

      - name: Extract changelog section
        run: |
          sed -n "/^## ${GITHUB_REF_NAME}/,/^## /{/^## /b;p}" CHANGELOG.md > RELEASE_CHANGELOG || true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          files: Aurora.${{ github.ref_name }}.zip
          body_path: RELEASE_CHANGELOG
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}